<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premium Task Manager</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Background Slideshow -->
<div class="background">
  <div class="slide active"></div>
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>
</div>

<div class="container">

  <h1>To-Do</h1>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-bar">
      <div id="progressFill"></div>
    </div>
    <span id="progressText">0% Completed</span>
  </div>

  <p id="taskCounter">0 tasks remaining</p>

 <input type="text" id="searchInput" class="hidden-search" placeholder="Search tasks...">

  <div class="filters">
    <button class="filter active" data-filter="all">All</button>
    <button class="filter" data-filter="active">Active</button>
    <button class="filter" data-filter="completed">Completed</button>
  </div>

  <div class="input-section">
    <input type="text" id="taskInput" placeholder="Add a new task...">
    <button id="addBtn"><i class="fa fa-plus"></i></button>
  </div>

  <ul id="taskList"></ul>

</div>

<script src="script.js"></script>
</body>
</html>
